{% extends "base.html" %}
{% block title %}登录 - OpenMedAILab{% endblock %}
{% block content %}
<div class="card" style="max-width: 460px;">
  <h1>登录</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">登录</button>
  </form>
  <p class="muted">还没有账号？<a href="{% url 'register' %}">注册</a></p>
</div>
{% endblock %}
