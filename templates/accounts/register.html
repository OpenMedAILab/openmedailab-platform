{% extends "base.html" %}
{% block title %}注册 - OpenMedAILab{% endblock %}
{% block content %}
<div style="max-width: 560px; margin: 40px auto;">
  <div class="card" style="border-top: 4px solid var(--primary); padding: 40px 32px;">
    <h1 style="text-align: center; margin-bottom: 24px; justify-content: center;"><span class="material-symbols-rounded" style="color: var(--primary); font-size: 32px;">person_add</span> 注册</h1>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" style="width: 100%; margin-top: 16px; padding: 12px; font-size: 1.1rem;"><span class="material-symbols-rounded">person_add</span> 创建账号</button>
    </form>
    <p class="muted" style="text-align: center; margin-top: 24px;">已有账号？ <a href="{% url 'login' %}" style="font-weight: 500;">登录</a></p>
  </div>
</div>
{% endblock %}
