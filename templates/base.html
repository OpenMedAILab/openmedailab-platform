<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}OpenMedAILab{% endblock %}</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #1f2933; background: #f7f8fa; }
    a { color: #0f766e; text-decoration: none; }
    header { background: #ffffff; border-bottom: 1px solid #e5e7eb; }
    nav { max-width: 1120px; margin: 0 auto; padding: 14px 20px; display: flex; gap: 18px; align-items: center; justify-content: space-between; }
    main { max-width: 1120px; margin: 0 auto; padding: 28px 20px 56px; }
    .brand { font-size: 20px; font-weight: 700; color: #111827; }
    .nav-links { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
    .messages { display: grid; gap: 8px; margin-bottom: 20px; }
    .message { padding: 10px 12px; background: #ecfdf5; border: 1px solid #a7f3d0; border-radius: 6px; }
    .grid { display: grid; gap: 16px; }
    .grid-2 { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    .grid-4 { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
    .card { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; }
    .muted { color: #64748b; }
    .pill { display: inline-flex; padding: 3px 8px; margin: 2px 4px 2px 0; border-radius: 999px; background: #eef2f7; color: #475569; font-size: 12px; }
    .button, button, input[type=submit] { display: inline-block; border: 1px solid #0f766e; background: #0f766e; color: #fff; border-radius: 6px; padding: 8px 12px; cursor: pointer; }
    .button.secondary, button.secondary { background: #fff; color: #0f766e; }
    form.inline { display: inline; }
    label { display: block; margin: 10px 0 4px; font-weight: 600; }
    input, select, textarea { width: 100%; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px; background: #fff; }
    .filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; align-items: end; }
    .project-title { font-size: 18px; font-weight: 700; margin: 0 0 8px; }
    .stats { font-size: 28px; font-weight: 700; }
    .markdown-body { white-space: pre-wrap; line-height: 1.7; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 18px; }
  </style>
</head>
<body>
  <header>
    <nav>
      <a class="brand" href="{% url 'home' %}">OpenMedAILab</a>
      <div class="nav-links">
        <a href="{% url 'project_list' %}">课题库</a>
        {% if user.is_authenticated %}
          <a href="{% url 'dashboard' %}">我的工作台</a>
          <a href="{% url 'profile' %}">个人资料</a>
          {% if user.is_staff %}<a href="/admin/">管理后台</a>{% endif %}
          <form class="inline" method="post" action="{% url 'logout' %}">{% csrf_token %}<button class="secondary" type="submit">退出</button></form>
        {% else %}
          <a href="{% url 'login' %}">登录</a>
          <a href="{% url 'register' %}">注册</a>
        {% endif %}
      </div>
    </nav>
  </header>
  <main>
    {% if messages %}
      <div class="messages">
        {% for message in messages %}<div class="message">{{ message }}</div>{% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
